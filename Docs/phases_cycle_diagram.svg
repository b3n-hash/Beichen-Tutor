<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#20242c"/>
    </marker>
    <marker id="bi" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4338ca"/>
    </marker>
    <style>
      .eyebrow{font-size:12.5px;letter-spacing:2.5px;font-weight:600;fill:#8a93a3}
      .h{font-size:25px;font-weight:700;fill:#20242c}
      .sub{font-size:13.5px;fill:#5b6472}
      .pname{font-size:17px;font-weight:700;fill:#20242c}
      .mode{font-size:12px;letter-spacing:1.5px;font-weight:700;fill:#4338ca}
      .act{font-size:12.5px;fill:#5b6472}
    </style>
  </defs>
  <rect width="1200" height="660" fill="#f6f7f9"/>

  <text x="40" y="48" class="eyebrow">PROJECT 7 · PEDAGOGICAL SPINE</text>
  <text x="40" y="82" class="h">The Inquiry Cycle — Pedaste 5-Phase × Bybee 5E</text>
  <text x="40" y="106" class="sub">Pedaste's phases are the states; the 5E mode (indigo) is the tutor's stance within each. It is a cycle, not a line.</text>
  <line x1="40" y1="122" x2="1160" y2="122" stroke="#dde1e7" stroke-width="1.5"/>

  <!-- 5 phase boxes -->
  <g>
    <!-- I -->
    <rect x="40" y="160" width="200" height="172" rx="11" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
    <rect x="40" y="160" width="200" height="6" rx="3" fill="#2f6f6a"/>
    <circle cx="68" cy="194" r="14" fill="#20242c"/><text x="68" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">I</text>
    <text x="92" y="199" class="pname">Orientation</text>
    <text x="60" y="228" class="mode">ENGAGE</text>
    <line x1="60" y1="240" x2="220" y2="240" stroke="#eceef2" stroke-width="1.2"/>
    <text x="60" y="262" class="act">Parse Q, build the</text>
    <text x="60" y="280" class="act">grounded answer key,</text>
    <text x="60" y="298" class="act">decompose into ranked</text>
    <text x="60" y="316" class="act">Components.</text>

    <!-- II -->
    <rect x="270" y="160" width="200" height="172" rx="11" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
    <rect x="270" y="160" width="200" height="6" rx="3" fill="#2f6f6a"/>
    <circle cx="298" cy="194" r="14" fill="#20242c"/><text x="298" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">II</text>
    <text x="322" y="199" class="pname">Conceptualise</text>
    <text x="290" y="228" class="mode">EXPLORE</text>
    <line x1="290" y1="240" x2="450" y2="240" stroke="#eceef2" stroke-width="1.2"/>
    <text x="290" y="262" class="act">Elicit one driving</text>
    <text x="290" y="280" class="act">Hypothesis; classify it:</text>
    <text x="290" y="298" class="act">false / true-ungrounded</text>
    <text x="290" y="316" class="act">/ true-grounded.</text>

    <!-- III -->
    <rect x="500" y="160" width="200" height="172" rx="11" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
    <rect x="500" y="160" width="200" height="6" rx="3" fill="#4338ca"/>
    <circle cx="528" cy="194" r="14" fill="#20242c"/><text x="528" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">III</text>
    <text x="552" y="199" class="pname">Investigate</text>
    <text x="520" y="228" class="mode">EXPLORE↔EVALUATE</text>
    <line x1="520" y1="240" x2="680" y2="240" stroke="#eceef2" stroke-width="1.2"/>
    <text x="520" y="262" class="act">Act on the diagnosis with</text>
    <text x="520" y="280" class="act">adaptive evidence; relate</text>
    <text x="520" y="298" class="act">it to the Hypothesis.</text>
    <text x="520" y="316" class="act" font-style="italic">loops per Component ↺</text>

    <!-- IV -->
    <rect x="730" y="160" width="200" height="172" rx="11" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
    <rect x="730" y="160" width="200" height="6" rx="3" fill="#9a5b2e"/>
    <circle cx="758" cy="194" r="14" fill="#20242c"/><text x="758" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">IV</text>
    <text x="782" y="199" class="pname">Conclude</text>
    <text x="750" y="228" class="mode">EXPLAIN→EVALUATE</text>
    <line x1="750" y1="240" x2="910" y2="240" stroke="#eceef2" stroke-width="1.2"/>
    <text x="750" y="262" class="act">Off-ramp offered, not</text>
    <text x="750" y="280" class="act">forced. Learner states</text>
    <text x="750" y="298" class="act">their own answer →</text>
    <text x="750" y="316" class="act">macro-eval (quiz + survey).</text>

    <!-- V -->
    <rect x="960" y="160" width="200" height="172" rx="11" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
    <rect x="960" y="160" width="200" height="6" rx="3" fill="#4338ca"/>
    <circle cx="988" cy="194" r="14" fill="#20242c"/><text x="988" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">V</text>
    <text x="1012" y="199" class="pname">Discussion</text>
    <text x="980" y="228" class="mode">EVALUATE→ELABORATE</text>
    <line x1="980" y1="240" x2="1140" y2="240" stroke="#eceef2" stroke-width="1.2"/>
    <text x="980" y="262" class="act">Surface new questions &amp;</text>
    <text x="980" y="280" class="act">parked sub-inquiries;</text>
    <text x="980" y="298" class="act">transfer to a new case.</text>
  </g>

  <!-- forward arrows -->
  <line x1="240" y1="246" x2="270" y2="246" stroke="#20242c" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="470" y1="246" x2="500" y2="246" stroke="#20242c" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="700" y1="246" x2="730" y2="246" stroke="#20242c" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="930" y1="246" x2="960" y2="246" stroke="#20242c" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- IV -> III wrong conclusion (short lower arc) -->
  <path d="M790 332 C 760 392 700 392 660 336" fill="none" stroke="#9a5b2e" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#b)"/>
  <text x="690" y="412" text-anchor="middle" class="sub" font-size="12" fill="#9a5b2e">wrong conclusion → revisit Components</text>

  <!-- V -> II big cycle arc -->
  <path d="M1060 332 C 1060 560 370 560 370 336" fill="none" stroke="#4338ca" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#bi)"/>
  <text x="715" y="545" text-anchor="middle" class="mode" font-size="13" fill="#4338ca">A NEW QUESTION SPAWNS A NEW CYCLE</text>

  <line x1="40" y1="600" x2="1160" y2="600" stroke="#dde1e7" stroke-width="1.5"/>
  <text x="40" y="626" class="sub">Phase boxes = process states (Pedaste). Indigo mode = tutor stance (5E). The dependency graph is traversed across these phases, not improvised.</text>
</svg>
