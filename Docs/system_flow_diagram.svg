<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#20242c"/>
    </marker>
    <marker id="ai" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4338ca"/>
    </marker>
    <style>
      .eyebrow{font-size:12.5px;letter-spacing:2.5px;font-weight:600;fill:#8a93a3}
      .h{font-size:25px;font-weight:700;fill:#20242c}
      .sub{font-size:13.5px;fill:#5b6472}
      .box{font-size:15px;font-weight:600;fill:#20242c}
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace}
    </style>
  </defs>
  <rect width="1000" height="1000" fill="#f6f7f9"/>

  <text x="40" y="50" class="eyebrow">PROJECT 7 · RUNTIME ARCHITECTURE</text>
  <text x="40" y="84" class="h">System Flow</text>
  <text x="40" y="108" class="sub">Setup runs once per Question; the loop runs every turn. The Decision Policy is where "what happens next" is chosen.</text>
  <line x1="40" y1="124" x2="960" y2="124" stroke="#dde1e7" stroke-width="1.5"/>

  <!-- SETUP -->
  <text x="40" y="156" class="eyebrow">SETUP · RUNS ONCE PER QUESTION</text>
  <g>
    <rect x="40" y="168" width="205" height="62" rx="9" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
    <text x="142" y="204" text-anchor="middle" class="box">Origin Question</text>
    <rect x="277" y="168" width="205" height="62" rx="9" fill="#fff" stroke="#2f6f6a" stroke-width="1.5"/>
    <text x="379" y="199" text-anchor="middle" class="box">Question</text>
    <text x="379" y="217" text-anchor="middle" class="box">Analysis</text>
    <rect x="514" y="168" width="205" height="62" rx="9" fill="#fff" stroke="#2f6f6a" stroke-width="1.5"/>
    <text x="616" y="199" text-anchor="middle" class="box">Conclusion</text>
    <text x="616" y="217" text-anchor="middle" class="box">Decomposition</text>
    <rect x="751" y="168" width="205" height="62" rx="9" fill="#fff" stroke="#2f6f6a" stroke-width="1.5"/>
    <text x="853" y="204" text-anchor="middle" class="box">Component Graph</text>
    <circle cx="812" cy="220" r="2.4" fill="#2f6f6a"/><circle cx="853" cy="222" r="2.4" fill="#2f6f6a"/><circle cx="894" cy="220" r="2.4" fill="#2f6f6a"/>
  </g>
  <line x1="245" y1="199" x2="275" y2="199" stroke="#20242c" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="482" y1="199" x2="512" y2="199" stroke="#20242c" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="719" y1="199" x2="749" y2="199" stroke="#20242c" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="500" y1="248" x2="500" y2="290" stroke="#20242c" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- LOOP -->
  <text x="40" y="316" class="eyebrow">INQUIRY LOOP · PER TURN</text>

  <rect x="400" y="330" width="200" height="56" rx="9" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
  <text x="500" y="364" text-anchor="middle" class="box">State Machine</text>
  <line x1="500" y1="386" x2="500" y2="420" stroke="#20242c" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="388" y="430" width="224" height="58" rx="9" fill="#fff" stroke="#2f6f6a" stroke-width="2"/>
  <text x="500" y="465" text-anchor="middle" class="box">Current Component</text>
  <line x1="500" y1="488" x2="500" y2="518" stroke="#20242c" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="330" y="520" width="340" height="104" rx="13" fill="#4338ca"/>
  <text x="500" y="558" text-anchor="middle" font-size="13.5" letter-spacing="2.2" font-weight="700" fill="#c7ccf2">THE INTELLECTUAL CORE</text>
  <text x="500" y="600" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">Decision Policy</text>

  <!-- fan -->
  <line x1="500" y1="624" x2="135" y2="700" stroke="#4338ca" stroke-width="1.4" marker-end="url(#ai)"/>
  <line x1="500" y1="624" x2="378" y2="700" stroke="#4338ca" stroke-width="1.4" marker-end="url(#ai)"/>
  <line x1="500" y1="624" x2="622" y2="700" stroke="#4338ca" stroke-width="1.4" marker-end="url(#ai)"/>
  <line x1="500" y1="624" x2="865" y2="700" stroke="#4338ca" stroke-width="1.4" marker-end="url(#ai)"/>

  <g>
    <rect x="40" y="702" width="175" height="52" rx="9" fill="#fff" stroke="#2f6f6a" stroke-width="1.5"/>
    <text x="127" y="734" text-anchor="middle" class="box">Ask Inquiry</text>
    <rect x="288" y="702" width="175" height="52" rx="9" fill="#fff" stroke="#2f6f6a" stroke-width="1.5"/>
    <text x="375" y="734" text-anchor="middle" class="box">Request Evidence</text>
    <rect x="536" y="702" width="175" height="52" rx="9" fill="#fff" stroke="#9a5b2e" stroke-width="1.5"/>
    <text x="623" y="734" text-anchor="middle" class="box">Give Hint</text>
    <rect x="784" y="702" width="175" height="52" rx="9" fill="#eef0fb" stroke="#4338ca" stroke-width="1.5"/>
    <text x="871" y="734" text-anchor="middle" class="box" fill="#4338ca">Advance</text>
  </g>

  <!-- loop-back rail (Inquiry/Evidence/Hint -> same component) -->
  <line x1="127" y1="754" x2="127" y2="784" stroke="#5b6472" stroke-width="1.3"/>
  <line x1="375" y1="754" x2="375" y2="784" stroke="#5b6472" stroke-width="1.3"/>
  <line x1="623" y1="754" x2="623" y2="784" stroke="#5b6472" stroke-width="1.3"/>
  <line x1="127" y1="784" x2="623" y2="784" stroke="#5b6472" stroke-width="1.3"/>
  <path d="M127 784 C 24 760 24 520 386 462" fill="none" stroke="#5b6472" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text x="34" y="640" class="sub" font-size="12.5" transform="rotate(-90 34 640)">↺ same Component · next turn</text>

  <!-- advance: all covered -> Conclude ; else next component -->
  <path d="M871 754 C 871 800 720 824 602 838" fill="none" stroke="#20242c" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="734" y="800" class="sub" font-size="12.5">all Components covered</text>
  <path d="M959 730 C 992 660 940 500 614 458" fill="none" stroke="#5b6472" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text x="966" y="600" class="sub" font-size="12.5" transform="rotate(-90 966 600)">else · next Component</text>

  <rect x="402" y="836" width="196" height="58" rx="9" fill="#fff" stroke="#20242c" stroke-width="1.5"/>
  <text x="500" y="862" text-anchor="middle" class="box">Conclude</text>
  <text x="500" y="881" text-anchor="middle" class="sub" font-size="12">Phase IV → Discussion</text>

  <line x1="40" y1="940" x2="960" y2="940" stroke="#dde1e7" stroke-width="1.5"/>
  <text x="40" y="966" class="sub" font-size="13">The LLM never decides the pedagogy — the architecture does. The model only generates language within the action the Decision Policy selects.</text>
</svg>
